<!DOCTYPE html>
<html lang="en" data-phosphor="amber">
  <head>
    <meta charset="utf-8" />
    <title>CLAUDE.THM</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="titlebar">
      <span class="tl">╔═ CLAUDE.THM ═╗</span>
      <span class="tr">v0.1</span>
    </header>

    <section id="scope" class="scope" aria-live="polite">
      <label class="scope-line">
        <input id="scope-toggle" type="checkbox" disabled />
        <span id="scope-label">DEFAULT (ALL TABS)</span>
      </label>
      <div id="scope-hint" class="scope-hint">checking current tab&hellip;</div>
    </section>

    <main class="menu" role="radiogroup" aria-label="Theme">
      <h1 id="menu-title">SELECT THEME:</h1>

      <button class="item" data-variant="amber" type="button">
        <span class="bullet">[ ]</span>
        <span class="label">AMBER</span>
        <span class="sub">IBM 5151 (1981)</span>
      </button>
      <button class="item" data-variant="green" type="button">
        <span class="bullet">[ ]</span>
        <span class="label">GREEN</span>
        <span class="sub">HERCULES / P1</span>
      </button>
      <button class="item" data-variant="white" type="button">
        <span class="bullet">[ ]</span>
        <span class="label">WHITE</span>
        <span class="sub">MDA / PAPER</span>
      </button>
      <button class="item" data-variant="cga" type="button">
        <span class="bullet">[ ]</span>
        <span class="label">CGA-4</span>
        <span class="sub">BLK / WHT / CYN / MAG</span>
      </button>
      <button class="item" data-variant="crt" type="button">
        <span class="bullet">[ ]</span>
        <span class="label">CRT</span>
        <span class="sub">SCANLINES + GLOW + BOOT</span>
      </button>
      <button class="item" data-variant="synthwave" type="button">
        <span class="bullet">[ ]</span>
        <span class="label">SYNTHWAVE</span>
        <span class="sub">NEON / GRID / OUTRUN</span>
      </button>
      <button class="item" data-variant="vanilla" type="button">
        <span class="bullet">[ ]</span>
        <span class="label">VANILLA</span>
        <span class="sub">CLAUDE DEFAULT (NO SKIN)</span>
      </button>
    </main>

    <footer class="statusbar">
      <span id="current">C:\CLAUDE&gt; _</span>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
